<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <!-- Título que aparece na aba do navegador -->
    <title>Lista de Tarefas</title>

    <!-- Conecta o arquivo de estilo -->
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <!-- Título principal da página -->
    <h1>Lista de Tarefas</h1>

    <!-- Tabela onde as tarefas serão exibidas-->
    <table id="tabelaTarefas">

        <!--Cabeçalho da tabela -->
        <thead>
            <tr>
                <th>Nome</th>
                <th>Custo</th>
                <th>Data Limite</th>
                <th>Ações</th>
            </tr>
        </thead>

        <!-- Corpo da tabela (onde o script vai inserir tarefas) -->
        <tbody id="listaTarefas"> <!--js coloque as tarefas aqui dentro-->
        </tbody>

    </table>

    <!-- Botão para adicionar nova tarefa -->
    <button onclick="abrirFormulario()">Adicionar Tarefa</button>

    <!-- Área que mostra o total dos custos -->
    <p>Total: R$ <span id="totalCustos">0</span></p>

    <!-- Formulário simples para adicionar tarefas -->
    <div id="formulario">

        <h2>Nova Tarefa</h2>

        <!-- Campo nome -->
        <input type="text" id="nomeTarefa" placeholder="Nome da tarefa">

        <!-- Campo custo -->
        <input type="number" id="custoTarefa" placeholder="Custo">

        <!-- Campo data -->
        <input type="date" id="dataTarefa">

        <!-- Botão salvar -->
        <button onclick="adicionarTarefa()">Salvar</button>

    </div>

    <!--ADICIONADO: modal de confirmação personalizado em português -->
    <div id="modalConfirmacao" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
        <div style="background:white; margin:20% auto; padding:24px; width:300px; border-radius:8px; text-align:center;">
            <p id="modalMensagem" style="margin-bottom:20px; font-size:16px;"></p>
            <button id="modalSim" style="margin-right:12px; padding:8px 24px;">Sim</button>
            <button id="modalNao" style="padding:8px 24px;">Não</button>
        </div>
    </div>

    <!-- Conecta o JavScript -->
    <script src="script.js"></script>

</body>
</html>
